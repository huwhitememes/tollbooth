    </filter>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="14" fill="url(#glow)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="13.5" fill="none" stroke="#213044"/>
  <rect x="8.5" y="8.5" width="47" height="47" rx="10.5" fill="#081015" stroke="#24564f" opacity="0.9"/>

