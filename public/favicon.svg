<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">agenttoll.dev icon</title>
  <desc id="desc">Dark rounded square with a teal x402 payment node mark.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="58%">
      <stop offset="0" stop-color="#102b34"/>
      <stop offset="0.58" stop-color="#071015"/>
      <stop offset="1" stop-color="#06080c"/>
    </radialGradient>
    <linearGradient id="stroke" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
