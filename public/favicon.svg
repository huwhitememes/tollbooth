    <path d="M16 32H48" stroke="url(#stroke)" stroke-width="4"/>
    <path d="M32 16V48" stroke="url(#stroke)" stroke-width="4"/>
    <circle cx="32" cy="32" r="6.5" fill="#7fd8ce" stroke="#7fd8ce" stroke-width="2"/>
  </g>

  <path d="M14 14h10M14 14v10M50 50H40M50 50V40" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" opacity="0.42"/>
